{% extends 'base.html' %}

{% block title %}Server Error - Elegant Events{% endblock %}

{% block content %}

<section class="section" style="min-height: 70vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center text-center">
            <div class="col-lg-6 reveal">
                <h1 style="font-size: 6rem; color: #ef4444; font-weight: 700; margin-bottom: 0;">500</h1>
                <div style="font-size: 4rem; color: #ef4444; margin-bottom: var(--spacing-md);">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h2 style="font-weight: 700;">Something Went Wrong</h2>
                <p style="color: var(--color-text-light); font-size: 1.1rem;">We're experiencing technical difficulties. Please try again later.</p>
                <div style="margin-top: var(--spacing-lg);">
                    <a href="{{ url_for('index') }}" class="btn btn-gold btn-lg">Return Home</a>
                    <a href="{{ url_for('contact') }}" class="btn btn-outline-gold btn-lg">Contact Us</a>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
