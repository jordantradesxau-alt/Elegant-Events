<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Elegant Events</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='files/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }

        .login-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
        }

        .login-container h1 {
            color: #d4af37;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .login-container p {
            color: rgba(255,255,255,0.4);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .login-container .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            width: 100%;
        }

        .login-container .form-control:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
            outline: none;
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .login-container .form-control::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .login-container .btn-gold {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .login-container .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.3);
            color: #fff;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .alert-danger {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.2);
            color: #86efac;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>✦ Elegant Events</h1>
        <p>Admin Login</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required autofocus>
            </div>
            <div class="form-group mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-gold">Login</button>
        </form>
    </div>
</body>
</html>
